spring:
  application:
    name: wise-spending-life

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: create

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

openai:
  apiKey: ${OPENAI_API_KEY}
  connect-timeout: 10s
  read-timeout: 30s

