spring:
  application:
    name: wise-spending-life

  datasource:
    url: ${DB_URL}
    hikari:
      max-lifetime: 300000   # 5분
      idle-timeout: 60000    # 1분
      minimum-idle: 1
      data-source-properties:
        prepareThreshold: 0
        autosave: conservative

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

openai:
  apiKey: ${OPENAI_API_KEY}
  connect-timeout: 10s
  read-timeout: 30s

