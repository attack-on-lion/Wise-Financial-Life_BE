name: CI/CD - ECR push (secrets only)

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

env:
  APP_DIR: wise-spending-life
  JAVA_VERSION: '17'
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 1) PR/Push 공통: 빌드(+테스트)용
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # push 인지 PR 인지에 따라 테스트 실행 분기
      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew clean assemble -x test --stacktrace
          else
            # push: keep tests skipped as before
            ./gradlew clean build -x test --stacktrace
          fi